<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chaiwey Chen | Wharton Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --wharton-blue: #003366;
            --penn-red: #990000;
            --text-dark: #1a1a1a;
            --text-light: #595959;
            --line-color: #e0e0e0;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: #f0f2f5;
            color: var(--text-dark);
            margin: 0;
            padding: 40px 15px;
            line-height: 1.5;
        }

        .resume-container {
            max-width: 900px;
            margin: 0 auto;
            background: #ffffff;
            padding: 50px 60px;
            border-radius: 4px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border-top: 12px solid var(--wharton-blue);
        }

        header {
            text-align: center;
            border-bottom: 2px solid var(--wharton-blue);
            padding-bottom: 20px;
            margin-bottom: 25px;
        }

        h1 {
            margin: 0;
            font-size: 2.4rem;
            color: var(--wharton-blue);
            letter-spacing: -0.5px;
            text-transform: uppercase;
        }

        .contact-bar {
            margin-top: 10px;
            font-size: 0.9rem;
            color: var(--text-light);
        }

        .contact-bar a {
            color: var(--wharton-blue);
            text-decoration: none;
            font-weight: 500;
        }

        h2 {
            font-size: 1.1rem;
            color: var(--wharton-blue);
            text-transform: uppercase;
            border-bottom: 1px solid var(--line-color);
            margin-top: 30px;
            margin-bottom: 15px;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
        }

        h2::after {
            content: "";
            flex: 1;
            height: 1px;
            background: var(--line-color);
            margin-left: 15px;
        }

        .entry { margin-bottom: 22px; }

        .entry-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            font-weight: 700;
            font-size: 1.05rem;
        }

        .entry-sub {
            display: flex;
            justify-content: space-between;
            font-style: italic;
            color: var(--text-light);
            font-size: 0.95rem;
            margin-bottom: 5px;
        }

        .location { font-weight: 500; font-style: normal; color: var(--text-dark); }

        ul {
            padding-left: 18px;
            margin: 0;
        }

        li {
            margin-bottom: 5px;
            font-size: 0.92rem;
            color: #333;
        }

        .skills-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            font-size: 0.92rem;
        }

        .badge {
            background: #f1f4f8;
            color: var(--wharton-blue);
            padding: 2px 8px;
            border-radius: 3px;
            font-weight: 600;
            font-size: 0.8rem;
            margin-right: 4px;
        }

        .highlight { color: var(--penn-red); font-weight: 600; }

        @media print {
            body { background: white; padding: 0; }
            .resume-container { box-shadow: none; border: none; width: 100%; padding: 0; }
        }
    </style>
</head>
<body>

<div class="resume-container">
    <header>
        <h1>CHAIWEY CHEN</h1>
